name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The ZAP Nim port targets the Nim 0.18.x toolchain era (see TODO.md).
      # The official nimlang/nim:0.18.0 image pins that compiler + its nimble
      # deterministically, matching exactly what is verified locally.
      #
      # That image (Debian 2018, glibc < 2.28) is too old to host the Node-based
      # actions/checkout, so checkout runs on the runner host and the Nim build
      # runs inside the image via `docker run` over the checked-out tree.
      - name: Build and test in nimlang/nim:0.18.0
        run: |
          docker run --rm -v "$PWD:/src" -w /src nimlang/nim:0.18.0 sh -euc '
            nim --version
            # Resolve collections#v0.3.4 from zap.nimble (git-ref pin; the 0.18
            # nimble predates `==` version ranges).
            nimble install -dy
            # nimble test builds + runs pack/unpack, compress, AnyPointer and
            # single-segment copying round-trips, then compiles the zapc code
            # generator. This is the production-ready serialization layer.
            nimble test
          '
